<!doctype html>
<html><head><meta charset="utf-8"><title>WebtoonList</title>
<style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial;padding:20px} .tabs{margin:10px 0} .tab{display:inline-block;padding:8px 12px;border:1px solid #ccc;border-bottom:none;cursor:pointer;margin-right:6px} .active{background:#f3f3f3;font-weight:600} .list{border:1px solid #ccc;padding:12px}</style>
</head><body>
<h1>WebtoonList</h1>
<div class="tabs">
<button class="tab" data-day="mon">Mon</button>
<button class="tab" data-day="tue">Tue</button>
<button class="tab" data-day="wed">Wed</button>
<button class="tab" data-day="thu">Thu</button>
<button class="tab" data-day="fri">Fri</button>
<button class="tab" data-day="sat">Sat</button>
<button class="tab" data-day="sun">Sun</button>
</div>
<div id="content" class="list"></div>
<script>
function dayKeyFromIndex(i){return ['mon','tue','wed','thu','fri','sat','sun'][i%7]}
function renderDay(day, data){
  var out='';
  if(!data[day] || data[day].length==0){ out='<p>(No items)</p>'; }
  else{ out='<ul>'; for(var it of data[day]){ out+='<li><a href="'+it.url+'" target="_blank">'+it.title+'</a></li>'; } out+='</ul>' }
  document.getElementById('content').innerHTML = out;
}

var DATA={"mon": [{"title": "회귀한 공작가의 막내도련님", "url": "https://comic.naver.com/webtoon/detail?titleId=821195"}, {"title": "참교육", "url": "https://comic.naver.com/webtoon/detail?titleId=758037"}, {"title": "시한부 천재가 살아남는 법", "url": "https://comic.naver.com/webtoon/detail?titleId=832703"}, {"title": "환생 천마", "url": "https://comic.naver.com/webtoon/detail?titleId=822657"}], "tue": [{"title": "아포칼립스에 물류센터를 숨김", "url": "https://comic.naver.com/webtoon/detail?titleId=829743"}, {"title": "사표내고 이계에서 힐링합니다", "url": "https://comic.naver.com/webtoon/detail?titleId=800726"}, {"title": "절대회귀", "url": "https://comic.naver.com/webtoon/detail?titleId=828715"}, {"title": "회귀한 용병은 다 계획이 있다", "url": "https://comic.naver.com/webtoon/detail?titleId=832557"}, {"title": "괴력난신", "url": "https://comic.naver.com/webtoon/detail?titleId=821597"}], "wed": [{"title": "운명을 보는 회사원", "url": "https://comic.naver.com/webtoon/detail?titleId=797443"}, {"title": "화산귀환", "url": "https://comic.naver.com/webtoon/detail?titleId=769209"}, {"title": "전지적 독자 시점", "url": "https://comic.naver.com/webtoon/detail?titleId=747269"}, {"title": "일렉시드", "url": "https://comic.naver.com/webtoon/detail?titleId=717481"}, {"title": "어느 마법사의 식당", "url": "https://comic.naver.com/webtoon/detail?titleId=818888"}, {"title": "왕따가 격투기를 너무 잘함", "url": "https://comic.naver.com/webtoon/detail?titleId=806888"}, {"title": "66666년 만에 환생한 흑마법사", "url": "https://comic.naver.com/webtoon/detail?titleId=775141"}], "thu": [{"title": "재벌집 막내아들", "url": "https://comic.naver.com/webtoon/detail?titleId=800770"}, {"title": "엄청 소환된", "url": "https://comic.naver.com/webtoon/detail?titleId=831606"}, {"title": "게임 최강 트롤러", "url": "https://comic.naver.com/webtoon/detail?titleId=801698"}, {"title": "회귀한 천재 헌터의 슬기로운 청소생활", "url": "https://comic.naver.com/webtoon/detail?titleId=796827"}], "fri": [{"title": "상남자", "url": "https://comic.naver.com/webtoon/detail?titleId=751168"}, {"title": "저승파견고용직", "url": "https://comic.naver.com/webtoon/detail?titleId=838212"}, {"title": "열렙전사 3부", "url": "https://comic.naver.com/webtoon/detail?titleId=817032"}, {"title": "나 혼자 만렙 뉴비", "url": "https://comic.naver.com/webtoon/detail?titleId=773797"}, {"title": "A.I. 닥터", "url": "https://comic.naver.com/webtoon/detail?titleId=765804"}, {"title": "퇴마록", "url": "https://comic.naver.com/webtoon/detail?titleId=840485"}], "sat": [{"title": "부패의 사제", "url": "https://comic.naver.com/webtoon/detail?titleId=809722"}, {"title": "멸망한 세계의 취사병", "url": "https://comic.naver.com/webtoon/detail?titleId=818409"}, {"title": "비질란테", "url": "https://comic.naver.com/webtoon/detail?titleId=820371"}, {"title": "야매 힐러로 사는 법", "url": "https://comic.naver.com/webtoon/detail?titleId=808757"}, {"title": "멸망한 가문의 회귀자", "url": "https://comic.naver.com/webtoon/detail?titleId=819946"}, {"title": "플레이어가 과거를 숨김", "url": "https://comic.naver.com/webtoon/detail?titleId=811707"}], "sun": [{"title": "천화서고 대공자", "url": "https://comic.naver.com/webtoon/detail?titleId=805193"}, {"title": "일타강사 백사부", "url": "https://comic.naver.com/webtoon/detail?titleId=779632"}, {"title": "입학용병", "url": "https://comic.naver.com/webtoon/detail?titleId=758150"}]};
// set default day to today
var today = new Date();
var dayidx = (today.getDay()+6)%7; // make Mon=0
var dayKey = ['mon','tue','wed','thu','fri','sat','sun'][dayidx];
for(var b of document.querySelectorAll('.tab')){ if(b.dataset.day==dayKey) b.classList.add('active'); b.addEventListener('click', function(e){ document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); e.target.classList.add('active'); renderDay(e.target.dataset.day, DATA); }); }
renderDay(dayKey, DATA);
</script>
</body></html>
